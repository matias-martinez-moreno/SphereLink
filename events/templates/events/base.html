<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SphereLink{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
      body {
        margin: 0; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      
      .top-bar {
        background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
        color: white;
        height: 70px;
        display: flex;
        align-items: center;
        padding: 0 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        margin-bottom: 0;
        position: relative;
        z-index: 1000;
      }
      
      .top-bar h1 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      }
      
      .main-container {
        display: flex;
        flex: 1;
        min-height: calc(100vh - 70px);
        margin-top: 0;
      }
      
      nav {
        width: 280px;
        background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
        color: white;
        min-height: 100%;
        height: 100%;
        padding: 30px 20px;
        box-sizing: border-box;
        box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 999;
      }
      
      nav a {
        color: #ecf0f1;
        display: block;
        padding: 12px 15px;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        font-weight: 500;
      }
      
      nav a:hover {
        background: rgba(255,255,255,0.1);
        color: white;
        transform: translateX(5px);
      }
      
      main {
        flex-grow: 1;
        padding: 30px;
        background: #f8f9fa;
        overflow-y: auto;
      }
    </style>
</head>
{% load static %}
<body>
  <div class="top-bar">
    <img src="{% static 'events/logo4.png' %}" alt="SphereLink Logo" height="60" class="me-2" style="vertical-align: middle;">
  </div>
  
  <div class="main-container">
    <nav>
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'create_event' %}">Create Event</a>
      <a href="{% url 'my_events' %}">My Events</a>
      <a href="{% url 'profile' %}">My Profile</a>
      <a href="{% url 'logout' %}">Logout</a>
    </nav>
    <main>
      {% block content %}
      {% endblock %}
    </main>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
