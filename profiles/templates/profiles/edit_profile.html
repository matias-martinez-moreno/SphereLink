{% extends "events/base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Perfil</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="mb-3">
            <label for="{{ form.bio.id_for_label }}" class="form-label">Biografía</label>
            {{ form.bio }}
            {{ form.bio.errors }}
        </div>

        <div class="mb-3">
            <label for="{{ form.location.id_for_label }}" class="form-label">Ubicación</label>
            {{ form.location }}
            {{ form.location.errors }}
        </div>

        <div class="mb-3">
            <label for="{{ form.avatar.id_for_label }}" class="form-label">Avatar</label>
            {{ form.avatar }}
            {{ form.avatar.errors }}
        </div>

        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="{% url 'my_profile' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
