{% extends "events/base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Profile</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="mb-3">
            <label for="{{ form.bio.id_for_label }}" class="form-label">Biography</label>
            {{ form.bio }}
            {{ form.bio.errors }}
        </div>

        <!-- <div class="mb-3">
            <label for="{{ form.location.id_for_label }}" class="form-label">Ubication</label>
            {{ form.location }}
            {{ form.location.errors }}
        </div> -->

        <div class="mb-3">
            <label for="{{ form.Photo.id_for_label }}" class="form-label">Profile Photo</label>
            {{ form.photo }}
            {{ form.photo.errors }}
        </div>

        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancelar</button>

    </form>
</div>
{% endblock %}
